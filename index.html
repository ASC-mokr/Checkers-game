<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шашки</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        h1 { margin: 10px 0; }

        #status {
            margin: 10px 0;
            font-size: 1.2rem;
            font-weight: bold;
            color: #f1c40f;
        }

        #info {
            margin-bottom: 10px;
            font-size: 1rem;
            color: #95a5a6;
            min-height: 20px;
        }

        #board {
            display: grid;
            grid-template-columns: repeat(8, 60px);
            grid-template-rows: repeat(8, 60px);
            border: 5px solid #5d4037;
        }

        .cell {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell.white { background-color: #f0d9b5; }
        .cell.black { background-color: #b58863; }
        .cell.selected { background-color: #6a9c4d !important; }
        .cell.hint { background-color: #7f9c68 !important; cursor: pointer; }
        .cell.capture { background-color: #c0392b !important; cursor: pointer; }

        .piece {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            box-shadow: 0 3px 6px rgba(0,0,0,0.4);
            position: relative;
            pointer-events: none;
        }

        .piece.white-piece {
            background: radial-gradient(circle at 30% 30%, #fff, #bdc3c7);
            border: 2px solid #95a5a6;
        }

        .piece.black-piece {
            background: radial-gradient(circle at 30% 30%, #555, #000);
            border: 2px solid #000;
        }

        .piece.king::after {
            content: '👑';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1rem;
            background-color: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover { background-color: #c0392b; }

        @media (max-width: 550px) {
            #board {
                grid-template-columns: repeat(8, 45px);
                grid-template-rows: repeat(8, 45px);
            }
            .cell { width: 45px; height: 45px; }
            .piece { width: 35px; height: 35px; }
        }
    </style>
</head>
<body>

    <h1>Шашки</h1>
    <div id="status">Ваш ход (Белые)</div>
    <div id="info"></div>
    <div id="board"></div>
    <button onclick="resetGame()">Новая игра</button>

    <script>
        const SIZE = 8;
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const infoEl = document.getElementById('info');
        
        let board = [];
        let turn = 'white';
        let selected = null;
        let validMoves = [];
        let gameOver = false;
        let botTimer = null;
        
        // === СЕРИЙНЫЕ ВЗЯТИЯ ===
        let mustContinueFrom = null; // Если не null - фигура должна продолжить серию

        function initGame() {
            board = [];
            for (let r = 0; r < SIZE; r++) {
                board[r] = [];
                for (let c = 0; c < SIZE; c++) {
                    if ((r + c) % 2 === 1) {
                        if (r < 3) board[r][c] = { color: 'black', isKing: false };
                        else if (r > 4) board[r][c] = { color: 'white', isKing: false };
                        else board[r][c] = null;
                    } else {
                        board[r][c] = null;
                    }
                }
            }
            turn = 'white';
            selected = null;
            validMoves = [];
            gameOver = false;
            mustContinueFrom = null;
            if (botTimer) clearTimeout(botTimer);
            drawBoard();
            updateStatus();
        }

        function drawBoard() {
            boardEl.innerHTML = '';
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell ' + ((r + c) % 2 === 0 ? 'white' : 'black');
                    cell.dataset.r = r;
                    cell.dataset.c = c;

                    if (selected && selected.r === r && selected.c === c) {
                        cell.classList.add('selected');
                    }

                    for (let i = 0; i < validMoves.length; i++) {
                        if (validMoves[i].toR === r && validMoves[i].toC === c) {
                            cell.classList.add(validMoves[i].kill ? 'capture' : 'hint');
                            break;
                        }
                    }

                    const piece = board[r][c];
                    if (piece) {
                        const pDiv = document.createElement('div');
                        pDiv.className = 'piece ' + (piece.color === 'white' ? 'white-piece' : 'black-piece');
                        if (piece.isKing) pDiv.classList.add('king');
                        cell.appendChild(pDiv);
                    }

                    boardEl.appendChild(cell);
                }
            }
        }

        boardEl.addEventListener('click', function(e) {
            if (gameOver || turn !== 'white') return;
            
            const cell = e.target.closest('.cell');
            if (!cell) return;

            const r = parseInt(cell.dataset.r);
            const c = parseInt(cell.dataset.c);

            // Если кликнули по подсказке хода
            for (let i = 0; i < validMoves.length; i++) {
                if (validMoves[i].toR === r && validMoves[i].toC === c) {
                    executeMove(validMoves[i]);
                    return;
                }
            }

            // Если есть обязательная серия - нельзя выбрать другую фигуру
            if (mustContinueFrom) {
                infoEl.innerText = "⚠️ Продолжайте серию взятий!";
                return;
            }

            // Выбор фигуры
            if (board[r][c] && board[r][c].color === 'white') {
                selected = { r: r, c: c };
                validMoves = getValidMoves(r, c);
                infoEl.innerText = "";
                drawBoard();
            }
        });

        function getValidMoves(r, c) {
            const piece = board[r][c];
            if (!piece) return [];
            
            const moves = [];
            
            // Дамка - без изменений
            if (piece.isKing) {
                const dirs = [[-1,-1], [-1,1], [1,-1], [1,1]];
                
                for (let i = 0; i < dirs.length; i++) {
                    let nr = r + dirs[i][0];
                    let nc = c + dirs[i][1];
                    let foundEnemy = null;
                    
                    while (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        if (board[nr][nc] === null) {
                            if (foundEnemy === null) {
                                moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, kill: null });
                            } else {
                                moves.push({ 
                                    fromR: r, fromC: c, 
                                    toR: nr, toC: nc, 
                                    kill: { r: foundEnemy.r, c: foundEnemy.c } 
                                });
                            }
                        } else if (board[nr][nc].color === piece.color) {
                            break;
                        } else {
                            if (foundEnemy !== null) break;
                            foundEnemy = { r: nr, c: nc };
                        }
                        nr += dirs[i][0];
                        nc += dirs[i][1];
                    }
                }
            } else {
                // Пешка - без изменений
                const dirs = piece.color === 'white' ? [[-1,-1], [-1,1]] : [[1,-1], [1,1]];
                
                for (let i = 0; i < dirs.length; i++) {
                    const nr = r + dirs[i][0];
                    const nc = c + dirs[i][1];
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === null) {
                        moves.push({ fromR: r, fromC: c, toR: nr, toC: nc, kill: null });
                    }
                }
            }
            
            // Взятия для всех
            const caps = [[-1,-1], [-1,1], [1,-1], [1,1]];
            for (let i = 0; i < caps.length; i++) {
                const mr = r + caps[i][0];
                const mc = c + caps[i][1];
                const jr = r + caps[i][0] * 2;
                const jc = c + caps[i][1] * 2;
                
                if (jr >= 0 && jr < SIZE && jc >= 0 && jc < SIZE) {
                    if (board[jr][jc] === null && board[mr][mc] && board[mr][mc].color !== piece.color) {
                        moves.push({ fromR: r, fromC: c, toR: jr, toC: jc, kill: { r: mr, c: mc } });
                    }
                }
            }
            
            return moves;
        }

        function executeMove(move) {
            const piece = board[move.fromR][move.fromC];
            
            board[move.toR][move.toC] = piece;
            board[move.fromR][move.fromC] = null;
            
            if (move.kill) {
                board[move.kill.r][move.kill.c] = null;
            }
            
            // Превращение в дамку
            let becameKing = false;
            if (!piece.isKing) {
                if (piece.color === 'white' && move.toR === 0) {
                    piece.isKing = true;
                    becameKing = true;
                }
                if (piece.color === 'black' && move.toR === 7) {
                    piece.isKing = true;
                    becameKing = true;
                }
            }
            
            // === ПРОВЕРКА НА ПРОДОЛЖЕНИЕ СЕРИИ (только для пешек) ===
            if (move.kill && !becameKing && !piece.isKing) {
                // Проверяем, может ли эта же пешка бить дальше
                const nextCaptureMoves = getValidMoves(move.toR, move.toC).filter(m => m.kill);
                
                if (nextCaptureMoves.length > 0) {
                    // Должна продолжить серию!
                    mustContinueFrom = { r: move.toR, c: move.toC };
                    selected = mustContinueFrom;
                    validMoves = nextCaptureMoves;
                    infoEl.innerText = "🔥 Продолжайте взятие!";
                    drawBoard();
                    
                    // Если это бот - продолжить серию
                    if (turn === 'black') {
                        setTimeout(() => botContinueSeries(nextCaptureMoves), 500);
                    }
                    return; // Ход НЕ завершён
                }
            }
            
            // Ход завершён
            mustContinueFrom = null;
            selected = null;
            validMoves = [];
            infoEl.innerText = "";
            drawBoard();
            
            if (checkWin()) return;
            
            turn = (turn === 'white') ? 'black' : 'white';
            updateStatus();
            
            if (turn === 'black' && !gameOver) {
                botTimer = setTimeout(botMove, 500);
            }
        }

        // === БОТ: ПРОДОЛЖЕНИЕ СЕРИИ ===
        function botContinueSeries(moves) {
            if (gameOver) return;
            
            const move = moves[Math.floor(Math.random() * moves.length)];
            executeMove(move);
        }

        function botMove() {
            if (gameOver) return;
            
            let allMoves = [];
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c] && board[r][c].color === 'black') {
                        const moves = getValidMoves(r, c);
                        for (let i = 0; i < moves.length; i++) {
                            allMoves.push(moves[i]);
                        }
                    }
                }
            }
            
            if (allMoves.length === 0) {
                statusEl.innerText = "🎉 Вы победили!";
                gameOver = true;
                return;
            }
            
            const caps = [];
            const normal = [];
            for (let i = 0; i < allMoves.length; i++) {
                if (allMoves[i].kill) caps.push(allMoves[i]);
                else normal.push(allMoves[i]);
            }
            
            const move = (caps.length > 0) 
                ? caps[Math.floor(Math.random() * caps.length)]
                : normal[Math.floor(Math.random() * normal.length)];
            
            executeMove(move);
        }

        function updateStatus() {
            if (gameOver) return;
            statusEl.innerText = (turn === 'white') ? "Ваш ход (Белые)" : "Бот думает...";
        }

        function checkWin() {
            let white = 0, black = 0;
            let whiteMoves = 0, blackMoves = 0;
            
            for (let r = 0; r < SIZE; r++) {
                for (let c = 0; c < SIZE; c++) {
                    if (board[r][c]) {
                        if (board[r][c].color === 'white') {
                            white++;
                            whiteMoves += getValidMoves(r, c).length;
                        } else {
                            black++;
                            blackMoves += getValidMoves(r, c).length;
                        }
                    }
                }
            }
            
            if (white === 0 || whiteMoves === 0) {
                if (turn === 'white') {
                    statusEl.innerText = "😔 Вы проиграли!";
                    gameOver = true;
                    return true;
                }
            }
            
            if (black === 0 || blackMoves === 0) {
                if (turn === 'black') {
                    statusEl.innerText = "🎉 Вы победили!";
                    gameOver = true;
                    return true;
                }
            }
            
            return false;
        }

        function resetGame() {
            initGame();
        }

        initGame();
    </script>
</body>
</html>
